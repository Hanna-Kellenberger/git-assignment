<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Editor - Resumaxing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f3f4f6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-link {
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 400;
            line-height: 1;
        }

        .back-link:hover { color: #1e4db7; }

        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
            color: #111;
        }

        .btn-save {
            background: #1e4db7;
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-save:hover { background: #163a8f; }
        .btn-save.saved { background: #16a34a; }

        /* ── Main layout ── */
        .editor-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left panel ── */
        .left-panel {
            width: 320px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .form-section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1e4db7;
            margin-bottom: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 13px;
            color: #444;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            background: #e5e7eb;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 8px 10px;
            font-size: 13px;
            color: #333;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s, background 0.15s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            background: #fff;
            border-color: #1e4db7;
        }

        /* ── Dynamic list sections ── */
        .list-section { display: flex; flex-direction: column; gap: 12px; }

        .list-entry {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 12px;
            position: relative;
        }

        .list-entry .remove-entry {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: #bbb;
            font-size: 16px;
            cursor: pointer;
            line-height: 1;
        }

        .list-entry .remove-entry:hover { color: #e53e3e; }

        .add-btn {
            background: none;
            border: 1px dashed #1e4db7;
            color: #1e4db7;
            border-radius: 6px;
            padding: 7px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
        }

        .add-btn:hover { background: #e8eef8; }

        .bullets-label {
            font-size: 12px;
            color: #666;
            margin: 8px 0 4px;
        }

        .bullet-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 4px;
        }

        .bullet-row input {
            flex: 1;
            background: #e5e7eb;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 12px;
            outline: none;
        }

        .bullet-row input:focus { background: #fff; border-color: #1e4db7; }

        .bullet-row .remove-bullet {
            background: none;
            border: none;
            color: #bbb;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
        }

        .bullet-row .remove-bullet:hover { color: #e53e3e; }

        .add-bullet-btn {
            background: none;
            border: none;
            color: #1e4db7;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 0;
        }

        .skills-input-row {
            display: flex;
            gap: 6px;
        }

        .skills-input-row input {
            flex: 1;
            background: #e5e7eb;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 7px 10px;
            font-size: 13px;
            outline: none;
        }

        .skills-input-row input:focus { background: #fff; border-color: #1e4db7; }

        .skills-input-row button {
            background: #1e4db7;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 7px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

        .skill-tag {
            background: #e8eef8;
            color: #1e4db7;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .skill-tag button {
            background: none;
            border: none;
            color: #1e4db7;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            line-height: 1;
        }

        /* ── Right panel (preview) ── */
        .right-panel {
            flex: 1;
            background: #d1d5db;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 32px 24px;
        }

        /* ── Resume paper ── */
        .resume-paper {
            background: #fff;
            width: 680px;
            min-height: 880px;
            padding: 48px 52px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.15);
            font-family: 'Georgia', serif;
            color: #222;
            flex-shrink: 0;
        }

        .rp-name {
            font-size: 28px;
            font-weight: 700;
            color: #1e4db7;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .rp-title {
            font-size: 14px;
            color: #555;
            text-align: center;
            margin-top: 4px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .rp-contact {
            display: flex;
            justify-content: center;
            gap: 0;
            flex-wrap: wrap;
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .rp-contact span:not(:last-child)::after {
            content: ' • ';
            margin: 0 4px;
            color: #aaa;
        }

        .rp-divider {
            border: none;
            border-top: 2px solid #1e4db7;
            margin: 14px 0;
        }

        .rp-section { margin-bottom: 20px; }

        .rp-section-title {
            font-size: 13px;
            font-weight: 700;
            color: #1e4db7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .rp-summary {
            font-size: 13px;
            line-height: 1.6;
            color: #333;
        }

        .rp-entry { margin-bottom: 12px; }

        .rp-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .rp-entry-role {
            font-size: 14px;
            font-weight: 700;
            color: #111;
        }

        .rp-entry-dates {
            font-size: 12px;
            color: #777;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .rp-entry-company {
            font-size: 13px;
            font-style: italic;
            color: #555;
            margin-top: 1px;
        }

        .rp-entry ul {
            margin-top: 5px;
            padding-left: 18px;
        }

        .rp-entry ul li {
            font-size: 12px;
            color: #333;
            line-height: 1.6;
        }

        .rp-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .rp-skill {
            background: #e8eef8;
            color: #1e4db7;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 12px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .rp-edu-degree { font-size: 14px; font-weight: 700; color: #111; }
        .rp-edu-school { font-size: 13px; font-style: italic; color: #555; }
        .rp-edu-dates  { font-size: 12px; color: #777; font-family: 'Segoe UI', Arial, sans-serif; }

        /* save toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #16a34a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <a href="/dashboard" class="back-link">←</a>
            <h1>Resume Editor</h1>
        </div>
        <button class="btn-save" id="btnSave">Save</button>
    </div>

    <!-- Body -->
    <div class="editor-body">

        <!-- ── Left panel ── -->
        <div class="left-panel" id="leftPanel">

            <!-- Personal Information -->
            <div>
                <div class="form-section-title">Personal Information</div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="f-name" placeholder="John Doe" />
                </div>
                <div class="form-group">
                    <label>Professional Title</label>
                    <input type="text" id="f-title" placeholder="Software Engineer" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="f-email" placeholder="john@email.com" />
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="f-phone" placeholder="(555) 123-4567" />
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="f-location" placeholder="City, State" />
                </div>
                <div class="form-group">
                    <label>LinkedIn / Website</label>
                    <input type="text" id="f-linkedin" placeholder="linkedin.com/in/yourname" />
                </div>
            </div>

            <!-- Summary -->
            <div>
                <div class="form-section-title">Professional Summary</div>
                <div class="form-group">
                    <textarea id="f-summary" rows="4" placeholder="Write a short summary..."></textarea>
                </div>
            </div>

            <!-- Experience -->
            <div>
                <div class="form-section-title">Work Experience</div>
                <div class="list-section" id="exp-list"></div>
                <button class="add-btn" id="add-exp">+ Add Experience</button>
            </div>

            <!-- Education -->
            <div>
                <div class="form-section-title">Education</div>
                <div class="list-section" id="edu-list"></div>
                <button class="add-btn" id="add-edu">+ Add Education</button>
            </div>

            <!-- Skills -->
            <div>
                <div class="form-section-title">Skills</div>
                <div class="skills-input-row">
                    <input type="text" id="skill-input" placeholder="e.g. JavaScript" />
                    <button id="add-skill">Add</button>
                </div>
                <div class="skill-tags" id="skill-tags"></div>
            </div>

        </div>

        <!-- ── Right panel (live preview) ── -->
        <div class="right-panel">
            <div class="resume-paper" id="resumePaper">
                <div class="rp-name" id="rp-name">Your Name</div>
                <div class="rp-title" id="rp-title">Professional Title</div>
                <div class="rp-contact" id="rp-contact"></div>
                <hr class="rp-divider">

                <div class="rp-section">
                    <div class="rp-section-title">Professional Summary</div>
                    <p class="rp-summary" id="rp-summary"></p>
                </div>

                <div class="rp-section">
                    <div class="rp-section-title">Work Experience</div>
                    <div id="rp-exp"></div>
                </div>

                <div class="rp-section">
                    <div class="rp-section-title">Education</div>
                    <div id="rp-edu"></div>
                </div>

                <div class="rp-section">
                    <div class="rp-section-title">Skills</div>
                    <div class="rp-skills" id="rp-skills"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Saved!</div>

    <script>
        // ── Data passed from Flask ──
        const RESUME_ID = {{ resume.id }};
        const initialContent = {{ content | tojson }};

        // ── State ──
        let data = JSON.parse(JSON.stringify(initialContent));

        // ── Helpers ──
        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function val(id) { return document.getElementById(id)?.value || ''; }

        // ── Collect current form state into data ──
        function collectData() {
            data.name     = val('f-name');
            data.title    = val('f-title');
            data.email    = val('f-email');
            data.phone    = val('f-phone');
            data.location = val('f-location');
            data.linkedin = val('f-linkedin');
            data.summary  = val('f-summary');

            // Experience
            data.experience = [];
            document.querySelectorAll('.exp-entry').forEach(entry => {
                const bullets = [];
                entry.querySelectorAll('.bullet-input').forEach(b => {
                    if (b.value.trim()) bullets.push(b.value.trim());
                });
                data.experience.push({
                    role:    entry.querySelector('.exp-role').value,
                    company: entry.querySelector('.exp-company').value,
                    dates:   entry.querySelector('.exp-dates').value,
                    bullets
                });
            });

            // Education
            data.education = [];
            document.querySelectorAll('.edu-entry').forEach(entry => {
                data.education.push({
                    degree: entry.querySelector('.edu-degree').value,
                    school: entry.querySelector('.edu-school').value,
                    dates:  entry.querySelector('.edu-dates').value,
                });
            });
        }

        // ── Update live preview ──
        function updatePreview() {
            collectData();

            document.getElementById('rp-name').textContent  = data.name  || 'Your Name';
            document.getElementById('rp-title').textContent = data.title || 'Professional Title';
            document.getElementById('rp-summary').textContent = data.summary || '';

            // Contact line
            const contactFields = [data.email, data.phone, data.location, data.linkedin].filter(Boolean);
            document.getElementById('rp-contact').innerHTML =
                contactFields.map(f => `<span>${esc(f)}</span>`).join('');

            // Experience
            document.getElementById('rp-exp').innerHTML = (data.experience || []).map(e => `
                <div class="rp-entry">
                    <div class="rp-entry-header">
                        <span class="rp-entry-role">${esc(e.role)}</span>
                        <span class="rp-entry-dates">${esc(e.dates)}</span>
                    </div>
                    <div class="rp-entry-company">${esc(e.company)}</div>
                    ${e.bullets && e.bullets.length ? `<ul>${e.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>` : ''}
                </div>
            `).join('');

            // Education
            document.getElementById('rp-edu').innerHTML = (data.education || []).map(e => `
                <div class="rp-entry" style="margin-bottom:10px;">
                    <div class="rp-entry-header">
                        <span class="rp-edu-degree">${esc(e.degree)}</span>
                        <span class="rp-edu-dates">${esc(e.dates)}</span>
                    </div>
                    <div class="rp-edu-school">${esc(e.school)}</div>
                </div>
            `).join('');

            // Skills
            document.getElementById('rp-skills').innerHTML = (data.skills || [])
                .map(s => `<span class="rp-skill">${esc(s)}</span>`).join('');
        }

        // ── Render experience entry in left panel ──
        function renderExpEntry(exp, index) {
            const div = document.createElement('div');
            div.className = 'list-entry exp-entry';
            div.innerHTML = `
                <button class="remove-entry" data-idx="${index}">✕</button>
                <div class="form-group" style="margin-bottom:8px;">
                    <label>Job Title</label>
                    <input class="exp-role" type="text" value="${esc(exp.role || '')}" placeholder="Senior Engineer" />
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                    <label>Company</label>
                    <input class="exp-company" type="text" value="${esc(exp.company || '')}" placeholder="Company Name" />
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                    <label>Dates</label>
                    <input class="exp-dates" type="text" value="${esc(exp.dates || '')}" placeholder="2021 – Present" />
                </div>
                <div class="bullets-label">Bullet Points</div>
                <div class="bullets-container">
                    ${(exp.bullets || []).map(b => bulletRowHTML(b)).join('')}
                </div>
                <button class="add-bullet-btn">+ Add bullet</button>
            `;
            div.querySelector('.remove-entry').addEventListener('click', () => {
                div.remove();
                updatePreview();
            });
            div.querySelector('.add-bullet-btn').addEventListener('click', () => {
                const row = createBulletRow('');
                div.querySelector('.bullets-container').appendChild(row);
            });
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', updatePreview));
            return div;
        }

        function bulletRowHTML(text) {
            return `<div class="bullet-row">
                <input class="bullet-input" type="text" value="${esc(text)}" placeholder="Describe an achievement..." />
                <button class="remove-bullet">✕</button>
            </div>`;
        }

        function createBulletRow(text) {
            const row = document.createElement('div');
            row.className = 'bullet-row';
            row.innerHTML = `
                <input class="bullet-input" type="text" value="${esc(text)}" placeholder="Describe an achievement..." />
                <button class="remove-bullet">✕</button>
            `;
            row.querySelector('.remove-bullet').addEventListener('click', () => { row.remove(); updatePreview(); });
            row.querySelector('input').addEventListener('input', updatePreview);
            return row;
        }

        // ── Render education entry ──
        function renderEduEntry(edu, index) {
            const div = document.createElement('div');
            div.className = 'list-entry edu-entry';
            div.innerHTML = `
                <button class="remove-entry" data-idx="${index}">✕</button>
                <div class="form-group" style="margin-bottom:8px;">
                    <label>Degree</label>
                    <input class="edu-degree" type="text" value="${esc(edu.degree || '')}" placeholder="B.S. Computer Science" />
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                    <label>School</label>
                    <input class="edu-school" type="text" value="${esc(edu.school || '')}" placeholder="University Name" />
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Dates</label>
                    <input class="edu-dates" type="text" value="${esc(edu.dates || '')}" placeholder="2018 – 2022" />
                </div>
            `;
            div.querySelector('.remove-entry').addEventListener('click', () => { div.remove(); updatePreview(); });
            div.querySelectorAll('input').forEach(i => i.addEventListener('input', updatePreview));
            return div;
        }

        // ── Populate left panel from data ──
        function populateForm() {
            document.getElementById('f-name').value     = data.name     || '';
            document.getElementById('f-title').value    = data.title    || '';
            document.getElementById('f-email').value    = data.email    || '';
            document.getElementById('f-phone').value    = data.phone    || '';
            document.getElementById('f-location').value = data.location || '';
            document.getElementById('f-linkedin').value = data.linkedin || '';
            document.getElementById('f-summary').value  = data.summary  || '';

            const expList = document.getElementById('exp-list');
            expList.innerHTML = '';
            (data.experience || []).forEach((e, i) => expList.appendChild(renderExpEntry(e, i)));

            const eduList = document.getElementById('edu-list');
            eduList.innerHTML = '';
            (data.education || []).forEach((e, i) => eduList.appendChild(renderEduEntry(e, i)));

            renderSkillTags();
        }

        // ── Skills ──
        function renderSkillTags() {
            document.getElementById('skill-tags').innerHTML = (data.skills || []).map((s, i) => `
                <span class="skill-tag">
                    ${esc(s)}
                    <button data-si="${i}">✕</button>
                </span>
            `).join('');
            document.querySelectorAll('#skill-tags button').forEach(btn => {
                btn.addEventListener('click', () => {
                    data.skills.splice(parseInt(btn.dataset.si), 1);
                    renderSkillTags();
                    updatePreview();
                });
            });
        }

        // ── Wire up static inputs ──
        function wireInputs() {
            ['f-name','f-title','f-email','f-phone','f-location','f-linkedin','f-summary'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });

            document.getElementById('add-exp').addEventListener('click', () => {
                const entry = renderExpEntry({ role:'', company:'', dates:'', bullets:[] }, -1);
                document.getElementById('exp-list').appendChild(entry);
                // wire bullet remove buttons inside new entry
                entry.querySelectorAll('.remove-bullet').forEach(btn => {
                    btn.addEventListener('click', () => { btn.closest('.bullet-row').remove(); updatePreview(); });
                });
            });

            document.getElementById('add-edu').addEventListener('click', () => {
                document.getElementById('edu-list').appendChild(renderEduEntry({ degree:'', school:'', dates:'' }, -1));
            });

            document.getElementById('add-skill').addEventListener('click', addSkill);
            document.getElementById('skill-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); addSkill(); }
            });
        }

        function addSkill() {
            const input = document.getElementById('skill-input');
            const val = input.value.trim();
            if (!val) return;
            if (!data.skills) data.skills = [];
            data.skills.push(val);
            input.value = '';
            renderSkillTags();
            updatePreview();
        }

        // ── Save ──
        document.getElementById('btnSave').addEventListener('click', async () => {
            collectData();
            const res = await fetch(`/api/resumes/${RESUME_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: data, title: data.name || 'My Resume' })
            });
            if (res.ok) {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }
        });

        // ── Boot ──
        populateForm();
        updatePreview();
        wireInputs();

        // Wire bullet remove buttons on initial load
        document.querySelectorAll('.remove-bullet').forEach(btn => {
            btn.addEventListener('click', () => { btn.closest('.bullet-row').remove(); updatePreview(); });
        });
    </script>
</body>
</html>
